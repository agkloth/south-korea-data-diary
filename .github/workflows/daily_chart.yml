name: Daily South Korea Chart

on:
  workflow_dispatch:
    inputs:
      chart_name:
        description: "Which chart do you want to generate?"
        required: true
        default: "city-portrait"
        type: choice
        options:
          - city-portrait
          - gyeonggi-cities
          - three-engines
          - camp-humphreys
          - air-quality
          - population-growth
          - port-cargo

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas matplotlib seaborn requests openpyxl numpy

      - name: Generate chart
        env:
          AIRKOREA_KEY: ${{ secrets.AIRKOREA_KEY }}
          CHART_NAME: ${{ github.event.inputs.chart_name }}
        run: python scripts/generate_daily.py

      - name: Commit outputs
        run: |
          git config user.name "South Korea Data Bot"
          git config user.email "actions@github.com"
          git add outputs/ captions/ data/
          git diff --staged --quiet || git commit -m "chart: ${{ github.event.inputs.chart_name }} ($(date +'%Y-%m-%d'))"
          git push
